name: daily-episode

on:
  schedule:
    # 01:30 UTC = 04:30 EEST (summer) / 03:30 EET (winter).
    # Run < 30 min + typical cron delay keeps the episode live well before
    # 05:45 Europe/Helsinki in both halves of the year.
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      test_short:
        description: "Build a ~5 min test episode"
        default: "false"
      episode_date:
        description: "Override episode date (YYYY-MM-DD, optional)"
        default: ""

concurrency:
  group: episode
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GH_TOKEN: ${{ github.token }}
      TEST_SHORT: ${{ github.event.inputs.test_short || 'false' }}
      EPISODE_DATE: ${{ github.event.inputs.episode_date || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends ffmpeg

      - name: Update preferences from reactions
        run: python -m src.update_preferences

      - name: Fetch candidate stories
        run: python -m src.fetch

      - name: Extract full text
        run: python -m src.extract

      - name: Curate
        run: python -m src.curate

      - name: Write script
        run: python -m src.write_script

      - name: Synthesize audio
        run: python -m src.tts

      - name: Publish release + feed
        run: python -m src.publish

      - name: Create rating issue
        run: python -m src.feedback

      - name: Commit state (data/ + docs/)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          git commit -m "episode $(date -u +%F) [skip ci]" || { echo "nothing to commit"; exit 0; }
          for i in 1 2 3 4; do
            git push && break
            echo "push failed; rebasing and retrying in $((i*2))s"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((i*2))
          done

      - name: Upload pipeline artifacts for debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: out-${{ github.run_id }}
          path: |
            out/*.json
            out/script.txt
          if-no-files-found: ignore
          retention-days: 7
